# Default values for llama-stack.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
rawDeploymentMode: true

# Operator Mode Configuration
# Set to true to deploy using LlamaStackDistribution CRD via the llama-stack operator
# When enabled, a LlamaStackDistribution custom resource will be created instead of
# traditional Kubernetes resources (Deployment, Service)
# The ConfigMap containing llama-stack configuration is still created and referenced by the CRD
# Requires the llama-stack operator to be installed in the cluster
managedByOperator: false

# Network configuration (operator mode only)
# Controls network access and external exposure
network:
  # ExposeRoute creates an Ingress/Route for external access
  exposeRoute: false
  # AllowedFrom defines which namespaces can access the service
  # By default, only the namespace containing the LlamaStackDistribution and the operator namespace are allowed
  # allowedFrom:
  #   namespaces:
  #     - "namespace1"
  #     - "namespace2"
  #   labels:
  #     - "myproject/lls-allowed"

# User configuration (operator mode only)
# Specifies the ConfigMap containing llama-stack configuration
# userConfig:
#   configMapNamespace: ""  # Defaults to the same namespace as the CRD

# TLS configuration (operator mode only)
# Configures custom CA bundles for TLS
# tlsConfig:
#   caBundle:
#     configMapName: custom-ca-bundle
#     configMapNamespace: ""  # Defaults to the same namespace
#     configMapKeys:
#       - ca-bundle.crt

# Uvicorn workers (operator mode only)
# Number of uvicorn worker processes to run
# CPU requests are set to the number of workers when set
# workers: 4

# Pod disruption budget (operator mode only)
# podDisruptionBudget:
#   minAvailable: 1
#   # OR
#   maxUnavailable: 1

image:
  repository: llamastack/distribution-starter
  pullPolicy: IfNotPresent
  tag: "0.6.0"

imagePullSecrets: []
nameOverride: "llamastack"
fullnameOverride: "llamastack"

serviceAccount:
  create: false

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

progressDeadlineSeconds: 3600

strategy:
  type: Recreate

service:
  type: ClusterIP
  port: 8321

env:
  - name: RUN_CONFIG_PATH
    value: /app-config/config.yaml

# PGVector configuration - set enabled to true to enable pgvector integration
pgvector:
  enabled: true # backwards compatibility
  # When enabled, the following environment variables will be automatically added
  # from the 'pgvector' secret in the deployment.yaml
  # - POSTGRES_USER
  # - POSTGRES_PASSWORD
  # - POSTGRES_HOST
  # - POSTGRES_PORT
  # - POSTGRES_DBNAME

resources: {}

livenessProbe:
  httpGet:
    path: /v1/health
    port: 8321
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /v1/health
    port: 8321
  initialDelaySeconds: 15
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 3

autoscaling:
  enabled: false

# Additional volumes on the output Deployment definition.
volumes:
  - configMap:
      defaultMode: 420
      name: run-config
    name: run-config-volume
  - name: dot-llama
    persistentVolumeClaim:
      claimName: llama-stack-data
  - emptyDir: {}
    name: cache

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - mountPath: /app-config
    name: run-config-volume
  - mountPath: /.llama
    name: dot-llama
  - mountPath: /.cache
    name: cache

nodeSelector: {}

tolerations: []

affinity: {}

gcpServiceAccount:
  name: gcp-service-account
  mountPath: /var/secrets/gcp-service-account.json

vertexai:
  enabled: false
  #projectId:
  #location:

secrets: {}

# Extra secret references to mount as environment variables in init and main containers
# Example: extraSecretRefs: [{ name: my-api-keys-secret }]
extraSecretRefs: []

mcp-servers: {}
models:
  gpt-oss-20b:
    id: openai/gpt-oss-20b
    enabled: false
  llama-3-2-3b-instruct:
    id: meta-llama/Llama-3.2-3B-Instruct
    enabled: false
  llama-guard-3-8b:
    id: meta-llama/Llama-Guard-3-8B
    enabled: false
    registerShield: true
  llama-3-2-1b-instruct:
    id: meta-llama/Llama-3.2-1B-Instruct
    enabled: false
  llama-3-1-8b-instruct:
    id: meta-llama/Llama-3.1-8B-Instruct
    enabled: false
  llama-guard-3-1b:
    id: meta-llama/Llama-Guard-3-1B
    enabled: false
    registerShield: true
  llama-3-3-70b-instruct:
    id: meta-llama/Llama-3.3-70B-Instruct
    enabled: false
  llama-3-2-1b-instruct-quantized:
    id: RedHatAI/Llama-3.2-1B-Instruct-quantized.w8a8
    enabled: false
  # To configure LlamaStack with remote llm provider (without registering a specific model),
  # set url and optionally apiToken, then set enabled to true
  remote-llm:
    url: ""
    apiToken: ""
    enabled: false

# Vector IO provider persistence configuration
# By default uses kv_default backend defined in storage section
# For multi-replica deployments, override in parent values.yaml to use PostgreSQL
vectorIOKvstore:
  namespace: vector_io::pgvector
  backend: kv_default

# Optional: Override storage backends (defaults to SQLite if not provided)
# storage:
#   backends:
#     kv_default:
#       type: kv_postgres
#       host: pgvector
#       port: 5432
#       db: llama_agents
#       user: postgres
#       password: rag_password
#     sql_default:
#       type: sql_postgres
#       host: pgvector
#       port: 5432
#       db: llama_responses
#       user: postgres
#       password: rag_password

providers:
  agents:
    - provider_id: meta-reference
      provider_type: inline::meta-reference
      config:
        persistence:
          agent_state:
            namespace: agents
            backend: kv_default
          responses:
            table_name: responses
            backend: sql_default
            max_write_queue_size: 10000
            num_writers: 4

