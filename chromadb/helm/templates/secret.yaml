{{- if .Values.secret.create }}
kind: Secret
apiVersion: v1
metadata:
  name: {{ include "chromadb.fullname" . }}
  namespace: {{ include "chromadb.namespace" . }}
  labels:
    {{- include "chromadb.labels" . | nindent 4 }}
data:
  host: {{ .Values.secret.host | b64enc | quote }}
  port: {{ .Values.secret.port | b64enc | quote }}
  uri: {{ printf "http://%s.%s:%s" .Values.secret.host (include "chromadb.namespace" .) .Values.secret.port | b64enc | quote }}
  {{- if .Values.auth.enabled }}
  token: {{ .Values.auth.token | b64enc | quote }}
  {{- end }}
type: Opaque
{{- end }}
