# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the fully qualified app name.
fullnameOverride: ""

# ── OdhDashboardConfig ────────────────────────────────────────────
# Controls which Gen AI Studio features are enabled in the dashboard.
# Set dashboardConfig.enabled to true only when RHOAI/ODH operator is installed.
dashboardConfig:
  enabled: false

playground:
  genAiStudio: false
  aiAssetCustomEndpoints: false
  externalProviders: false
  externalVectorStores: false
  promptManagement: false
  modelAsService: false
  mcpCatalog: false
  mlflow: false
  observabilityDashboard: false
  trainingJobs: false
  vllmDeploymentOnMaas: false
  llmGatewayField: false

  disableKueue: false
  disableLMEval: false

clusterDomains:
  - apps.cluster.example.com

notebookController:
  enabled: false

# ── MCP Server Registration ──────────────────────────────────────
# Creates a ConfigMap (gen-ai-aa-mcp-servers) in redhat-ods-applications
# that registers existing MCP server endpoints with the Playground UI.
# Each entry becomes a data key in the ConfigMap (name → JSON value).
# No new deployments are created — this points to already-deployed services.
# See: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/experimenting_with_models_in_the_gen_ai_playground/playground-prerequisites_rhoai-user
mcpServers:
  enabled: true
  namespace: redhat-ods-applications
  servers: []
  # Example entry (override in consuming chart's values):
  #   - name: MCP-OpenShift
  #     url: http://mcp-noc-openshift.{{ .Release.Namespace }}.svc:8000/mcp/
  #     description: OpenShift cluster operations
