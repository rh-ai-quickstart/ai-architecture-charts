{{- if and .Values.mcpServers.enabled .Values.mcpServers.servers }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-ai-aa-mcp-servers
  namespace: {{ .Values.mcpServers.namespace | default "redhat-ods-applications" }}
  labels:
    {{- include "playground.labels" . | nindent 4 }}
data:
  {{- range .Values.mcpServers.servers }}
  {{ .name }}: |
    {
      "url": {{ tpl .url $ | quote }}
      {{- if .description }},
      "description": {{ .description | quote }}
      {{- end }}
    }
  {{- end }}
{{- end }}
