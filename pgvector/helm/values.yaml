# pgvector is a thin wrapper around the postgres chart.
# All configuration is passed through to the postgres subchart.
# See ../postgres/helm/values.yaml for the full list of options.

postgres:
  image:
    repository: docker.io/pgvector/pgvector
    tag: pg17

  nameOverride: "pgvector"
  fullnameOverride: "pgvector"

  service:
    portName: postgresql

  # The pgvector image stores data at /var/lib/postgresql/data by default
  pgdata: /var/lib/postgresql/data

  volumeMounts:
    - mountPath: /var/lib/postgresql
      name: pg-data

  secret:
    host: pgvector
    dbname: rag_blueprint

  # Enable the vector extension on the default database
  initScripts:
    init-vector.sh: |
      #!/bin/bash
      set -e
      psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS vector;"

  # Extra databases can also have the vector extension:
  #   extraDatabases:
  #     - name: embeddings_db
  #       extensions:
  #         - vector
  extraDatabases: []
