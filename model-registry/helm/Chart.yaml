apiVersion: v2
name: model-registry
description: A Helm chart for OpenDataHub Model Registry on Kubernetes/OpenShift
type: application
version: 0.2.2
appVersion: "0.2.2"
keywords:
  - model-registry
  - openshift-ai
  - openshift
home: https://github.com/rh-ai-quickstart/ai-architecture-charts
maintainers:
  - name: Red Hat AI Quickstart Team
dependencies:
