{{- $root := . -}}
{{- $enabledPipelines := include "ingestion-pipeline.enabledPipelines" . | fromJson -}}
{{- if $enabledPipelines }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: register-pipelines
  labels:
    {{- include "ingestion-pipeline.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "ingestion-pipeline.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-pipeline
          image: "image-registry.openshift-image-registry.svc:5000/openshift/tools:latest"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              url="http://{{ include "ingestion-pipeline.fullname" . }}/ping"
              echo "Waiting for $url..."
              until curl -ksf "$url"; do
                echo "Still waiting for $url ..."
                sleep 10
              done
              echo "Ingestion pipeline service ready"
      containers:
        - name: register-pipelines
          image: "image-registry.openshift-image-registry.svc:5000/openshift/tools:latest"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              SERVICE_URL="http://{{ include "ingestion-pipeline.fullname" . }}"
              FAILED=0
              REGISTERED=0
              TOTAL={{ len $enabledPipelines }}

              register_pipeline() {
                local key="$1"
                local data="$2"
                local max_attempts=5
                local delay=10

                for attempt in $(seq 1 $max_attempts); do
                  HTTP_CODE=$(curl -s -o /tmp/response.txt -w '%{http_code}' \
                    -X POST "${SERVICE_URL}/add" \
                    -H 'accept: application/json' \
                    -H 'Content-Type: application/json' \
                    -d "$data" || echo "000")

                  if [ "$HTTP_CODE" = "200" ]; then
                    echo "Pipeline $key registered successfully:"
                    cat /tmp/response.txt
                    echo ""
                    REGISTERED=$((REGISTERED + 1))
                    return 0
                  else
                    echo "Attempt $attempt/$max_attempts failed (HTTP $HTTP_CODE), retrying in ${delay}s..."
                    cat /tmp/response.txt 2>/dev/null || true
                    echo ""
                    sleep $delay
                  fi
                done

                echo "ERROR: Failed to register pipeline $key after $max_attempts attempts"
                FAILED=$((FAILED + 1))
                return 1
              }

              COUNT=0
              {{- range $pipelineKey, $pipelineConfig := $enabledPipelines }}
              {{- $pipelineDict := dict "root" $root "pipelineKey" $pipelineKey "pipelineConfig" $pipelineConfig "pipelineName" $pipelineKey }}
              {{- $pipelineData := include "ingestion-pipeline.preparePipelineData" $pipelineDict }}

              COUNT=$((COUNT + 1))
              echo ""
              echo "=== Registering pipeline: {{ $pipelineKey }} ($COUNT/$TOTAL) ==="
              register_pipeline "{{ $pipelineKey }}" '{{ $pipelineData }}' || true

              # Pause between pipelines to avoid race conditions
              sleep 5
              {{- end }}

              echo ""
              if [ "$FAILED" -gt 0 ]; then
                echo "ERROR: $FAILED pipeline(s) failed to register out of $TOTAL"
                exit 1
              fi

              echo "All $TOTAL pipelines registered successfully ($REGISTERED/$TOTAL)"
      restartPolicy: Never
  backoffLimit: 3
{{- end }}
