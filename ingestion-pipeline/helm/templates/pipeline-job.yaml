{{- $root := . -}}
{{- $enabledPipelines := include "ingestion-pipeline.enabledPipelines" . | fromJson -}}

{{/* Only create the job if there are enabled pipelines */}}
{{- if $enabledPipelines }}
apiVersion: batch/v1
kind: Job
metadata:
  name: register-pipelines
  labels:
    {{- include "ingestion-pipeline.labels" $root | nindent 4 }}
    ingestion-pipeline.ai/component: pipeline-registration
  annotations:
    ingestion-pipeline.ai/pipeline-count: {{ len $enabledPipelines | quote }}
spec:
  template:
    metadata:
      labels:
        {{- include "ingestion-pipeline.labels" $root | nindent 8 }}
        ingestion-pipeline.ai/component: pipeline-registration
    spec:
      initContainers:
        - name: wait-for-pipeline
          image: "image-registry.openshift-image-registry.svc:5000/openshift/tools:latest"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              url="http://{{ include "ingestion-pipeline.fullname" $root }}/ping"
              echo "Waiting for $url..."
              until curl -ksf "$url"; do
                echo "Still waiting for $url ..."
                sleep 10
              done
              echo "Ingestion pipeline service ready"
      containers:
        - name: register-pipelines
          image: "image-registry.openshift-image-registry.svc:5000/openshift/tools:latest"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e

              FAILED=0
              REGISTERED=0
              SERVICE_URL="http://{{ include "ingestion-pipeline.fullname" $root }}"

              register_pipeline() {
                local key="$1"
                local data="$2"
                local max_attempts=5
                local delay=10

                echo "========================================"
                echo "Registering pipeline: $key"
                echo "========================================"

                for attempt in $(seq 1 $max_attempts); do
                  echo "Attempt $attempt/$max_attempts for pipeline: $key"
                  if curl -sfX 'POST' \
                    "${SERVICE_URL}/add" \
                    -H 'accept: application/json' \
                    -H 'Content-Type: application/json' \
                    -d "$data"; then
                    echo ""
                    echo "Pipeline $key registered successfully"
                    REGISTERED=$((REGISTERED + 1))
                    return 0
                  fi
                  echo ""
                  echo "Attempt $attempt failed for pipeline: $key"
                  if [ $attempt -lt $max_attempts ]; then
                    echo "Retrying in ${delay}s..."
                    sleep $delay
                  fi
                done

                echo "ERROR: Failed to register pipeline $key after $max_attempts attempts"
                FAILED=$((FAILED + 1))
                return 1
              }

              {{- $index := 0 }}
              {{- range $pipelineKey, $pipelineConfig := $enabledPipelines }}
              {{- $pipelineDict := dict "root" $root "pipelineKey" $pipelineKey "pipelineConfig" $pipelineConfig "pipelineName" $pipelineKey }}
              {{- $pipelineData := include "ingestion-pipeline.preparePipelineData" $pipelineDict }}

              {{- if gt $index 0 }}
              echo "Pausing 5s between pipeline registrations..."
              sleep 5
              {{- end }}

              register_pipeline {{ $pipelineKey | quote }} '{{ $pipelineData }}' || true
              {{- $index = add $index 1 }}
              {{- end }}

              echo ""
              echo "========================================"
              echo "Pipeline registration complete"
              echo "Registered: $REGISTERED"
              echo "Failed: $FAILED"
              echo "========================================"

              if [ $FAILED -gt 0 ]; then
                echo "ERROR: $FAILED pipeline(s) failed to register"
                exit 1
              fi

              echo "All pipelines registered successfully"
      restartPolicy: Never
  backoffLimit: 3
{{- end }}
